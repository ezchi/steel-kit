# Steel-Kit Configuration
# Copy this to your project root and customize.
# Runtime config is stored in .steel/config.json (generated by `steel init`).

forge:
  provider: claude    # claude | gemini | codex
  # model: opus       # Provider-specific model (optional)

gauge:
  provider: gemini    # claude | gemini | codex
  # model: default    # Provider-specific model (optional)

maxIterations: 5      # Max forge-gauge loop iterations per stage
autoCommit: true      # Auto-commit each forge/gauge step
specsDir: specs       # Directory for spec artifacts

# Git branching configuration
# git:
#   workflow: steel       # steel | github-flow | gitflow
#   branchPrefix: spec/   # Prefix for feature branches (e.g. spec/, feature/, eda-)
#   baseBranch: main      # Base branch to create feature branches from
#   # developBranch: develop  # Required for gitflow workflow
